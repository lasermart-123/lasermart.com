    <style>
        /* HERO SECTION */

        .dual-hero {
            width: 100%;
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 18, 60, 0.85),
                    rgba(0, 18, 60, 0.85)),
                url('./img/bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            color: #fff;
            padding: 100px 0;
        }

        .hero-content {
            max-width: 650px;
        }

        .hero-content span {
            background: #ff5b2e;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .hero-content h1 {
            font-size: 65px;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .hero-content p {
            font-size: 18px;
            line-height: 1.8;
            color: #ddd;
            margin-bottom: 35px;
        }

        .hero-btns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .hero-btns a {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn1 {
            background: #ff5b2e;
            color: #fff;
        }

        .btn1:hover {
            background: #fff;
            color: #00123c;
        }

        .btn2 {
            border: 2px solid #fff;
            color: #fff;
        }

        .btn2:hover {
            background: #fff;
            color: #00123c;
        }

        /* FEATURES */

        .features {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 42px;
            color: #00123c;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .feature-box {
            background: #fff;
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
        }

        .feature-box:hover {
            transform: translateY(-10px);
        }

        .feature-box i {
            font-size: 45px;
            color: #ff5b2e;
            margin-bottom: 20px;
        }

        .feature-box h3 {
            margin-bottom: 15px;
            color: #00123c;
        }

        .feature-box p {
            line-height: 1.7;
            color: #555;
        }

        /* ABOUT SECTION */

        .about {
            padding: 90px 0;
            background: #fff;
        }

        .about-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 50px;
            align-items: center;
        }

        .about-image img {
            width: 100%;
            border-radius: 25px;
        }

        .about-content h2 {
            font-size: 45px;
            color: #00123c;
            margin-bottom: 20px;
        }

        .about-content p {
            line-height: 1.9;
            color: #555;
            margin-bottom: 25px;
        }

        .about-list {
            margin-top: 25px;
        }

        .about-list li {
            list-style: none;
            margin-bottom: 15px;
            font-size: 17px;
            color: #00123c;
        }

        .about-list i {
            color: #ff5b2e;
            margin-right: 10px;
        }

        /* PRODUCT SPEC */

        .specs {
            padding: 90px 0;
        }

        .spec-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .spec-box {
            background: #00123c;
            padding: 40px 30px;
            border-radius: 20px;
            color: #fff;
        }

        .spec-box h3 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        .spec-box p {
            line-height: 1.8;
            color: #ddd;
        }

        /* CTA */

        .cta {
            background: linear-gradient(90deg, #00123c, #0a2d80);
            padding: 80px 0;
            text-align: center;
            color: #fff;
        }

        .cta h2 {
            font-size: 45px;
            margin-bottom: 20px;
        }

        .cta p {
            max-width: 700px;
            margin: auto;
            line-height: 1.8;
            margin-bottom: 35px;
            color: #ddd;
        }

        .cta a {
            text-decoration: none;
            background: #ff5b2e;
            color: #fff;
            padding: 16px 40px;
            border-radius: 50px;
            display: inline-block;
            transition: 0.3s;
        }

        .cta a:hover {
            background: #fff;
            color: #00123c;
        }

        /* FOOTER */

        footer {
            background: #000814;
            color: #fff;
            text-align: center;
            padding: 25px 0;
        }

        /* RESPONSIVE */

        @media(max-width:991px) {

            .feature-grid,
            .spec-grid,
            .about-wrapper {
                grid-template-columns: repeat(2, 1fr);
            }

            .hero-content h1 {
                font-size: 48px;
            }

        }

        @media(max-width:576px) {

            .feature-grid,
            .spec-grid,
            .about-wrapper {
                grid-template-columns: 1fr;
            }

            .hero-content h1 {
                font-size: 34px;
            }

            .hero-content p,
            .about-content p,
            .spec-box p {
                font-size: 15px;
            }

            .hero-btns a {
                width: 100%;
                text-align: center;
            }

            .section-title h2,
            .about-content h2,
            .cta h2 {
                font-size: 30px;
            }

        }
    </stule>

/* OPEN CHAT */

function openChat(){

  document.getElementById("welcomePopup").style.display = "none";

/* BOT MESSAGE */

function showBotMessage(message){

  const row = document.createElement("div");

  row.className = "bot-row";

  row.innerHTML = `

    <div class="bot-avatar">👩</div>

    <div class="bot-message">
      ${message}
    </div>

  `;

  chatbox.appendChild(row);

}

/* USER MESSAGE */

function showUserMessage(text){

  const div = document.createElement("div");

  div.className = "user-message";

  div.innerText = text;

  chatbox.appendChild(div);

}

/* SHOW OPTIONS */

function showOptions(optionsArray){

  const optionsDiv = document.createElement("div");

  optionsDiv.className = "options";

  optionsArray.forEach(item=>{

    const btn = document.createElement("button");

    btn.className = "option-btn";

    btn.innerText = item.question;

    btn.onclick = (event)=>{

      // IMPORTANT FIX
      // STOP WINDOW CLICK EVENT

      event.stopPropagation();

      // USER QUESTION

      showUserMessage(item.question);

      // REMOVE OLD QUESTIONS

      optionsDiv.remove();

      // BOT ANSWER

      setTimeout(()=>{

        showBotMessage(item.answer);

        // AGAIN SHOW ALL QUESTIONS

        setTimeout(()=>{

          showOptions(flow);

        },400);

      },500);

    };

    optionsDiv.appendChild(btn);

  });

  chatbox.appendChild(optionsDiv);

}

/* OUTSIDE CLICK CLOSE FIX */

document.addEventListener("click", function(event){

  const chatbot = document.getElementById("chatbot");

  const chatIcon = document.querySelector(".chat-icon");

  // IF CHATBOT CLOSED
  if(chatbot.style.display === "none") return;

  // CLICK INSIDE CHATBOT
  if(chatbot.contains(event.target)) return;

  // CLICK CHAT ICON
  if(chatIcon.contains(event.target)) return;

  // OTHERWISE CLOSE CHAT
  chatbot.style.display = "none";

});
