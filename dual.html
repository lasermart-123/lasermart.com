<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Content Sliders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.slider-box{
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    margin-bottom: 25px;
}

.slider-box img{
    width: 100%;
    height: 400px;
    object-fit: cover;
}

.overlay-content{
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 25px;
    color: #fff;
    background: linear-gradient(
        to top,
        rgba(0,0,0,0.8),
        rgba(0,0,0,0.2),
        transparent
    );
}

.overlay-content h3{
    font-size: 28px;
    margin-bottom: 10px;
}

.overlay-content p{
    margin: 0;
}

.carousel-control-prev,
.carousel-control-next{
    width: 10%;
}

@media(max-width:768px){
    .slider-box img{
        height: 300px;
    }

    .overlay-content h3{
        font-size: 22px;
    }
}
</style>
</head>
<body>

<div id="customSlider" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

        <!-- Slide 1 -->
        <div class="carousel-item active">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <img src="https://picsum.photos/800/500?1" class="img-fluid rounded">
                </div>
                <div class="col-md-6 p-5">
                    <h2>Slide 1</h2>
                    <p>Image Left, Content Right</p>
                </div>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="carousel-item">
            <div class="row align-items-center">
                <div class="col-md-6 p-5">
                    <h2>Slide 2</h2>
                    <p>Content Left, Image Right</p>
                </div>
                <div class="col-md-6">
                    <img src="https://picsum.photos/800/500?2" class="img-fluid rounded">
                </div>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="carousel-item">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <img src="https://picsum.photos/800/500?3" class="img-fluid rounded">
                </div>
                <div class="col-md-6 p-5">
                    <h2>Slide 3</h2>
                    <p>Image Left, Content Right</p>
                </div>
            </div>
        </div>

    </div>

    <button class="carousel-control-prev" type="button"
        data-bs-target="#customSlider" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button"
        data-bs-target="#customSlider" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
